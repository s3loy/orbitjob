  /healthz:
    get:
      operationId: getHealthz
      summary: Health check
      description: Liveness probe endpoint. Returns HTTP 200 when service is up.
      tags:
      - System
      parameters:
      - name: X-Trace-ID
        in: header
        schema:
          type: string
          maxLength: 128
      responses:
