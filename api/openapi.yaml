                additionalProperties: true
components:
  schemas:
    APIError:
      type: object
      properties:
        code:
          type: string
        field:
          type: string
        message:
          type: string
      required:
      - code
      - message
    ChangeStatusRequest:
      type: object
      properties:
        version:
          type: integer
          minimum: 1
      required:
      - version
    ChangeStatusResult:
      type: object
      properties:
        created_at:
          type: string
          format: date-time
        id:
          type: integer
          format: int64
        name:
          type: string
        next_run_at:
          type: string
          format: date-time
          nullable: true
        status:
          type: string
        tenant_id:
          type: string
        updated_at:
          type: string
          format: date-time
        version:
          type: integer
      required:
      - id
      - name
      - tenant_id
      - status
      - version
      - created_at
      - updated_at
    CreateJobRequest:
      type: object
      properties:
        concurrency_policy:
          type: string
          enum:
          - allow
          - forbid
          - replace
          default: allow
        cron_expr:
          type: string
          description: Required when trigger_type=cron; must be empty when trigger_type=manual.
          nullable: true
        handler_payload:
          type: object
          additionalProperties: true
        handler_type:
          type: string
          maxLength: 32
        misfire_policy:
          type: string
          enum:
          - skip
          - fire_now
          - catch_up
          default: skip
        name:
          type: string
          maxLength: 128
        partition_key:
          type: string
          nullable: true
          maxLength: 64
        priority:
          type: integer
          minimum: 0
        retry_backoff_sec:
          type: integer
          minimum: 0
        retry_backoff_strategy:
          type: string
          enum:
          - fixed
          - exponential
          default: fixed
        retry_limit:
          type: integer
          minimum: 0
        tenant_id:
          type: string
          default: default
          maxLength: 64
        timeout_sec:
          type: integer
          default: 60
          minimum: 1
        timezone:
          type: string
          default: UTC
          maxLength: 64
        trigger_type:
          type: string
          enum:
          - cron
          - manual
      required:
      - name
      - trigger_type
      - handler_type
    CreateResult:
      type: object
      properties:
        created_at:
