openapi: 3.0.3
info:
  title: OrbitJob API
  version: 0.1.0
  description: Code-first OpenAPI document generated from OrbitJob HTTP route metadata and DTOs.
paths:
  /api/v1/jobs:
    get:
      operationId: listJobs
      summary: List jobs
      description: List jobs for one tenant. tenant_id defaults to "default" and limit defaults to 50 when omitted.
      tags:
      - Jobs
      parameters:
      - name: X-Trace-ID
        in: header
        schema:
          type: string
          maxLength: 128
      - name: tenant_id
        in: query
        schema:
          type: string
          default: default
          maxLength: 64
      - name: status
        in: query
        schema:
          type: string
          enum:
          - active
          - paused
      - name: limit
        in: query
        schema:
          type: integer
          default: 50
          minimum: 1
          maximum: 100
      - name: offset
        in: query
        schema:
          type: integer
          default: 0
          minimum: 0
      responses:
        "200":
          description: Job list
          headers:
            X-Trace-ID:
              description: Trace identifier echoed back to clients. Generated when request does not provide one.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobListResponse"
        "400":
          description: Invalid request
          headers:
            X-Trace-ID:
              description: Trace identifier echoed back to clients. Generated when request does not provide one.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal error
          headers:
            X-Trace-ID:
              description: Trace identifier echoed back to clients. Generated when request does not provide one.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createJob
      summary: Create one job
      description: Create a job definition. cron_expr is required when trigger_type=cron, and must be empty when trigger_type=manual.
      tags:
      - Jobs
      parameters:
      - name: X-Trace-ID
        in: header
        schema:
          type: string
          maxLength: 128
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateJobRequest"
      responses:
        "201":
          description: Created job
          headers:
            X-Trace-ID:
              description: Trace identifier echoed back to clients. Generated when request does not provide one.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateResult"
        "400":
          description: Invalid request
          headers:
            X-Trace-ID:
              description: Trace identifier echoed back to clients. Generated when request does not provide one.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal error
          headers:
            X-Trace-ID:
              description: Trace identifier echoed back to clients. Generated when request does not provide one.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/jobs/{id}:
    get:
      operationId: getJob
      summary: Get one job
      description: Get one job by id. tenant_id defaults to "default" when omitted.
      tags:
      - Jobs
      parameters:
      - name: X-Trace-ID
        in: header
        schema:
          type: string
          maxLength: 128
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
          minimum: 1
      - name: tenant_id
        in: query
        schema:
          type: string
          default: default
          maxLength: 64
      responses:
        "200":
          description: Job detail
          headers:
            X-Trace-ID:
              description: Trace identifier echoed back to clients. Generated when request does not provide one.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetItem"
        "400":
          description: Invalid request
          headers:
            X-Trace-ID:
              description: Trace identifier echoed back to clients. Generated when request does not provide one.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Job not found
          headers:
            X-Trace-ID:
              description: Trace identifier echoed back to clients. Generated when request does not provide one.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal error
          headers:
            X-Trace-ID:
              description: Trace identifier echoed back to clients. Generated when request does not provide one.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateJob
      summary: Update one job
      description: "Merge-style update: unspecified fields keep existing values. When trigger_type is changed to manual without cron_expr, existing cron_expr is cleared."
      tags:
      - Jobs
      parameters:
      - name: X-Trace-ID
        in: header
        schema:
          type: string
          maxLength: 128
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
          minimum: 1
      - name: tenant_id
        in: query
        schema:
          type: string
          default: default
          maxLength: 64
      - name: X-Actor-ID
        in: header
        required: true
        schema:
          type: string
          maxLength: 128
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateJobRequest"
      responses:
        "200":
          description: Updated job
          headers:
            X-Trace-ID:
              description: Trace identifier echoed back to clients. Generated when request does not provide one.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateResult"
        "400":
          description: Invalid request
          headers:
            X-Trace-ID:
              description: Trace identifier echoed back to clients. Generated when request does not provide one.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Job not found
          headers:
            X-Trace-ID:
              description: Trace identifier echoed back to clients. Generated when request does not provide one.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Version conflict
          headers:
            X-Trace-ID:
              description: Trace identifier echoed back to clients. Generated when request does not provide one.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal error
          headers:
            X-Trace-ID:
              description: Trace identifier echoed back to clients. Generated when request does not provide one.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/jobs/{id}/pause:
    post:
      operationId: pauseJob
      summary: Pause one job
      description: Pause an active job definition using optimistic locking by version.
      tags:
      - Jobs
      parameters:
      - name: X-Trace-ID
        in: header
        schema:
          type: string
          maxLength: 128
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
          minimum: 1
      - name: tenant_id
        in: query
        schema:
          type: string
          default: default
          maxLength: 64
      - name: X-Actor-ID
        in: header
        required: true
        schema:
          type: string
          maxLength: 128
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangeStatusRequest"
      responses:
        "200":
          description: Paused job
          headers:
            X-Trace-ID:
              description: Trace identifier echoed back to clients. Generated when request does not provide one.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChangeStatusResult"
        "400":
          description: Invalid request
          headers:
            X-Trace-ID:
              description: Trace identifier echoed back to clients. Generated when request does not provide one.
              schema:
                type: string
          content:
            application/json:
              schema:
